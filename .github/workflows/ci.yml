name: CI Pipeline

on:
  push:
    branches: [main, master]
  pull_request:
    branches: [main, master]

jobs:
  # 1. Python源码Lint测试
  python-lint:
    name: Python Lint
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v5

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: '3.10'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements_py310.txt

      - name: Check code formatting with Black
        run: black --check --diff . || echo "Black formatting issues found (non-blocking)"

      - name: Check import ordering with isort
        run: isort --check-only --diff . || echo "Import ordering issues found (non-blocking)"

      - name: Run type checking with mypy
        run: mypy app/ --ignore-missing-imports || echo "Type checking issues found (non-blocking)"

  # 2. Docker操作Lint测试
  docker-lint:
    name: Docker Lint
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v5

      - name: Lint Dockerfile with hadolint
        uses: hadolint/hadolint-action@v3.1.0
        with:
          dockerfile: Dockerfile
          failure-threshold: error

  # 3. Python源码冒烟测试
  python-smoke-test:
    name: Python Smoke Test
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v5

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: '3.10'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements_py310.txt

      - name: Run pytest smoke tests
        run: |
          pytest tests/ -v --tb=short
        env:
          LLM_API_KEY: "default"
          TTS_PROVIDER: "none"

  # 4. Docker构建冒烟测试
  docker-build-smoke-test:
    name: Docker Build Smoke Test
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v5

      - name: Build Docker image
        run: |
          docker build -f Dockerfile -t audiolex-backend:test .

      - name: Run container health check
        run: |
          # Run container in background
          docker run -d --name test-container \
            -p 8000:8000 \
            -e LLM_API_KEY="default" \
            -e TTS_PROVIDER="none" \
            audiolex-backend:test
          
          # Wait for container to start
          echo "Waiting for container to start..."
          sleep 15
          
          # Check if container is running
          docker ps | grep test-container || { echo "Container not running"; docker logs test-container; exit 1; }
          
          # Check health endpoint
          echo "Checking health endpoint..."
          curl -f http://localhost:8000/health || { echo "Health check failed"; docker logs test-container; exit 1; }
          
          echo "Health check passed!"
          
          # Cleanup
          docker stop test-container
          docker rm test-container

